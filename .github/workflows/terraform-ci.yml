name: Terraform Quality Gate

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
    paths:
      - '**.tf'
      - '**.tfvars'
      - '**.hcl'
      - '**.tftpl'
      - '.github/workflows/terraform-ci.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

env:
  TF_VERSION: "1.10.5"
  TFLINT_VERSION: "v0.55.0"

jobs:
  # ───────────────────────────────────────────────
  # 1. fmt + validate (matrix per layer/env)
  # ───────────────────────────────────────────────
  fmt-validate:
    name: fmt + validate (${{ matrix.layer }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        layer:
          - 0-bootstrap
          - tenant-provisioning
          - 1-org
          - 2-network
          - 3-apps
          - 4-observability
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        run: terraform -chdir=${{ matrix.layer }} fmt -check -diff -recursive

      - name: Terraform init (no backend)
        run: terraform -chdir=${{ matrix.layer }} init -backend=false

      - name: Terraform validate
        run: terraform -chdir=${{ matrix.layer }} validate -no-color

  # ───────────────────────────────────────────────
  # 2. TFLint
  # ───────────────────────────────────────────────
  tflint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.tflint.d/plugins
          key: tflint-${{ runner.os }}-${{ hashFiles('.tflint.hcl') }}

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - run: tflint --init
      - run: tflint --recursive --config="$(pwd)/.tflint.hcl" --format=compact

  # ───────────────────────────────────────────────
  # 3. tfsec - hard-fails on HIGH/CRITICAL
  # ───────────────────────────────────────────────
  tfsec:
    name: tfsec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: false
          additional_args: --minimum-severity HIGH --config-file .tfsec.yml

  # ───────────────────────────────────────────────
  # 4. Checkov - SARIF upload + hard fail on HIGH+
  # ───────────────────────────────────────────────
  checkov:
    name: checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          soft_fail: false
          output_format: sarif
          output_file_path: checkov-results.sarif

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  # ───────────────────────────────────────────────
  # 5. Secret scan
  # ───────────────────────────────────────────────
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION="8.21.2"
          curl -fsSL -o gitleaks.tgz "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tgz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks
        run: gitleaks detect --no-banner --redact --config=.gitleaks.toml --verbose --exit-code=1

  # ───────────────────────────────────────────────
  # 6. terraform-docs - module README drift check
  # ───────────────────────────────────────────────
  terraform-docs:
    name: terraform-docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-docs/gh-actions@v1.3.0
        with:
          working-dir: modules/project,modules/network,modules/instance,modules/security-group,modules/tenant,modules/scheduler
          output-file: README.md
          output-method: inject
          git-push: "false"
          fail-on-diff: "false"

  # ───────────────────────────────────────────────
  # 7. Cost estimate (Infracost - PR only)
  # ───────────────────────────────────────────────
  infracost:
    name: infracost
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Infracost secret
        id: secret
        run: |
          if [ -n "${{ secrets.INFRACOST_API_KEY }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::INFRACOST_API_KEY not configured - skipping cost diff"
          fi

      - if: steps.secret.outputs.present == 'true'
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - if: steps.secret.outputs.present == 'true'
        name: Generate Infracost breakdown
        run: infracost breakdown --path=. --format=json --out-file=/tmp/infracost.json || true
